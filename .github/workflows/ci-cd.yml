name: StudyMind Continuous Integration & Deployment (CI/CD)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  # 1. Quality Assurance Job: Test & Lint
  qa-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Codebase
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-size: 20
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Run Linter
      run: npm run lint

    - name: Build Application
      run: npm run build

  # 2. Deployment Job: Dockerize & Push to Google Artifact Registry
  deploy-production:
    needs: qa-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Codebase
      uses: actions/checkout@v4

    - name: Authenticate with Google Cloud
      id: auth
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }} # Google Cloud Service Account JSON Key

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Configure Docker authentication for GCP Artifact Registry
      run: gcloud auth configure-docker europe-west1-docker.pkg.dev --quiet

    - name: Build and Push Docker Image
      run: |
        docker build -t europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/studymind/app:${{ github.sha }} -t europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/studymind/app:latest .
        docker push europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/studymind/app:latest
        docker push europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/studymind/app:${{ github.sha }}

    - name: Deploy to Cloud Run (Production)
      uses: google-github-actions/deploy-cloudrun@v2
      with:
        service: studymind-production-app
        region: europe-west1
        image: europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/studymind/app:${{ github.sha }}
        flags: '--allow-unauthenticated'
        env_vars: |
          NODE_ENV=production
          PORT=3000
