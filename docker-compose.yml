version: '3.8'

services:
  # 1. Main Full-Stack Application Container
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: studymind_app
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgres://${DB_USER:-studymind_user}:${DB_PASSWORD:-studymind_secure_pass}@db:5432/${DB_NAME:-studymind_prod}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-studymind_redis_pass}@redis:6379
      - JWT_SECRET=${JWT_SECRET:-studymind-jwt-secret-key-prod-999222}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-studymind-jwt-refresh-key-prod-888333}
      - GEMINI_API_KEY=${GEMINI_API_KEY} # Passed from host environment .env
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # 2. Production PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: studymind_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-studymind_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-studymind_secure_pass}
      POSTGRES_DB: ${DB_NAME:-studymind_prod}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 3. Redis Cache for Sessions, Rate Limiting & Fast Storage
  redis:
    image: redis:7-alpine
    container_name: studymind_redis
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-studymind_redis_pass}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-studymind_redis_pass}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 4. Automated Database Backups Service (Runs daily)
  db_backup:
    image: prodrigestivill/postgres-backup-local:16-alpine
    container_name: studymind_db_backup
    restart: always
    user: "1000:1000"
    volumes:
      - postgres_backups:/backups
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${DB_NAME:-studymind_prod}
      - POSTGRES_USER=${DB_USER:-studymind_user}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-studymind_secure_pass}
      - BACKUP_NUM_KEEP=7
      - BACKUP_FREQUENCY=1d
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  postgres_backups:
    driver: local
